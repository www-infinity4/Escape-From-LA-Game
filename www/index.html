<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape from L.A. – Snake Plissken's Escape</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      color: #c8a000;
      overflow: hidden;
    }
    canvas {
      display: block;
      border: 2px solid #c8a000;
      image-rendering: pixelated;
      cursor: crosshair;
    }
    #hint {
      margin-top: 6px;
      font-size: 11px;
      color: #555;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="hint">WASD / Arrow Keys: Move &nbsp;|&nbsp; Mouse Aim + Click / Spacebar: Shoot &nbsp;|&nbsp; Enter: Start</div>
  <script src="game.js"></script>
</body>
</html>
