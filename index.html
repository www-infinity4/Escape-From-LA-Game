<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Escape from L.A. – Snake Plissken's Escape</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      color: #c8a000;
    }
    #game-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      border: 2px solid #c8a000;
      image-rendering: pixelated;
      cursor: crosshair;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }
    #hint {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #555;
      letter-spacing: 0.05em;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Touch controls (shown only on touch screens) ── */
    #touch-controls { display: none; }
    @media (hover: none) and (pointer: coarse) {
      #hint { display: none; }
      #touch-controls {
        display: block;
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
    }

    #joystick-zone {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 50%;
      height: 45%;
      pointer-events: auto;
    }
    #joystick-base {
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid rgba(200,160,0,0.55);
      background: rgba(200,160,0,0.08);
      display: none;
      transform: translate(-50%, -50%);
    }
    #joystick-thumb {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(200,160,0,0.72);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    #fire-btn {
      position: absolute;
      right: 22px;
      bottom: 22px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(160,0,0,0.55);
      border: 3px solid rgba(255,70,70,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      font-weight: bold;
      pointer-events: auto;
      user-select: none;
      -webkit-user-select: none;
    }
    #fire-btn.active {
      background: rgba(220,0,0,0.75);
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="hint">WASD / Arrow Keys: Move &nbsp;|&nbsp; Mouse Aim + Click / Spacebar: Shoot &nbsp;|&nbsp; Enter: Start</div>
    <div id="touch-controls">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-thumb"></div>
        </div>
      </div>
      <div id="fire-btn">FIRE</div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
